<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lottery Number Generator</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6090997371163234"
     crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="weather-widget" class="weather-widget">
            <span id="weather-info">Loading weather...</span>
        </div>
        <div class="header">
            <h1>Lottery Number Generator</h1>
            <button id="theme-toggle">🌙</button>
        </div>
        <div id="results-container">
            <!-- 5 lines will be generated here -->
        </div>
        <button id="generate-btn">Generate 5 Sets</button>

        <div class="affiliate-section">
            <hr>
            <h3>제휴 문의</h3>
            <form action="https://formspree.io/f/xdawkpqw" method="POST" id="affiliate-form">
                <div class="form-group">
                    <label for="name">성함/업체명</label>
                    <input type="text" id="name" name="name" required placeholder="예: 홍길동 / (주)컴퍼니">
                </div>
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="website">웹사이트 (선택)</label>
                    <input type="url" id="website" name="website" placeholder="https://example.com">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" required placeholder="제휴하고 싶은 내용을 적어주세요."></textarea>
                </div>
                <button type="submit" class="submit-btn">문의하기</button>
            </form>
        </div>

        <div id="disqus_thread" class="comments-section"></div>
        <script>

        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>
    <script src="main.js"></script>
