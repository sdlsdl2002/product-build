<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인공지능 동물상 테스트 - 나는 어떤 동물과 닮았을까?</title>
    <meta name="description" content="얼굴로 보는 인공지능 동물상 테스트, 내가 강아지상인지 고양이상인지 확인해보세요!">
    <link rel="stylesheet" href="animal-style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <header class="animal-header">
        <nav class="animal-nav">
            <a href="/" class="back-home">⬅️ 로또 생성기로 돌아가기</a>
        </nav>
        <h1>동물상 테스트</h1>
        <p class="subtitle">인공지능이 분석하는 나의 동물상</p>
    </header>

    <main class="container">
        <section class="upload-section">
            <div id="upload-area" class="upload-area">
                <div class="upload-guide">
                    <img src="https://img.icons8.com/ios/100/777777/upload-to-cloud--v1.png" alt="upload icon" id="upload-icon">
                    <p id="upload-text">사진을 드래그하거나 클릭하여 업로드하세요</p>
                </div>
                <input type="file" id="image-input" accept="image/*" hidden>
                <img id="face-image" src="" alt="your face" style="display: none;">
            </div>
            
            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>인공지능이 분석 중입니다...</p>
            </div>

            <div id="result-area" class="result-area" style="display: none;">
                <h2 id="result-title">당신은 <span id="animal-name">...</span>상입니다!</h2>
                <p id="result-explain"></p>
                <div id="label-container"></div>
                <button onclick="window.location.reload()" class="retry-btn">다시 시도하기</button>
            </div>
        </section>

        <section class="info-section">
            <h3>테스트 안내</h3>
            <ul>
                <li>사진은 서버에 저장되지 않으며 오직 브라우저에서만 분석됩니다.</li>
                <li>정면 사진을 사용하면 더 정확한 결과를 얻을 수 있습니다.</li>
                <li>본 테스트는 재미로만 즐겨주세요!</li>
            </ul>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Animal Face Test. Powered by Teachable Machine.</p>
    </footer>

    <script src="animal-main.js"></script>
</body>
</html>
